# render.yaml - Render Blueprint
# This defines your service configuration for the LinkifyMe monorepo

services:
  - type: web
    name: linkifyme-backend
    runtime: python
    rootDir: backend
    region: singapore
    plan: free
    buildCommand: ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
      # Payment bypass — set to true for internal testing, false for live payments
      - key: BYPASS_PAYMENT
        value: false
      - key: RENTBASKET_API_BASE
        value: https://testapi.rentbasket.com
      # Secret env vars - set these in Render dashboard
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PDFSHIFT_API_KEY
        sync: false
      - key: RENTBASKET_JWT_TOKEN
        sync: false
    healthCheckPath: /health
    autoDeploy: true
